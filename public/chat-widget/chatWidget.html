<button id="chat-btn">
    <img src="../image/chirpy.png" style="width: 50px;
    height: 50px;
    object-fit: contain;" alt="Chirpy">
</button>

<div id="chat-box" class="hidden">

    <div class="chat-header">
        <span>CherbyAICHATBOT</span>
        <button id="close-chat">✕</button>
    </div>

    <div id="messages">
        <div class="bot-message">
           🐦 สวัสดีจ้า เชอร์ปี้ยินดีต้อนรับนะ วันนี้อยากให้เชอร์ปี้ช่วยอะไรบอกมาได้เลย 🌿
        </div>
    </div>

    <div class="chat-input">
        <input
            type="text"
            id="message"
            placeholder="พิมพ์ข้อความ..."
        >

        <button id="send-btn" style="color: #165348;">
            ส่ง
        </button>
    </div>

</div>
