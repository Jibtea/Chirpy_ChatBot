<button id="chat-btn">
    👴🏻
</button>

<div id="chat-box" class="hidden">

    <div class="chat-header">
        <span>👴🏻 ลุงพาเที่ยว</span>
        <button id="close-chat">✕</button>
    </div>

    <div id="messages">
        <div class="bot-message">
            สวัสดีจ้า มีอะไรให้ลุงช่วยแนะนำไหม 😊
        </div>
    </div>

    <div class="chat-input">
        <input
            type="text"
            id="message"
            placeholder="พิมพ์ข้อความ..."
        >

        <button id="send-btn" style="color: #165348;">
            ส่ง
        </button>
    </div>

</div>
